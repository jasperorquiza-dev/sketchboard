<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="12" dy="12" stdDeviation="0" flood-color="#2b2e2d" flood-opacity="1" />
    </filter>
  </defs>

  <!-- Notebook Base (Ivory paper) -->
  <rect x="64" y="64" width="384" height="384" rx="20" ry="20" fill="#fdfaf2" stroke="#2b2e2d" stroke-width="16" filter="url(#shadow)" />

  <!-- Ruled notebook lines (Blue/teal lines) -->
  <line x1="64" y1="140" x2="448" y2="140" stroke="#a9cbf7" stroke-width="6" stroke-dasharray="10 6" />
  <line x1="64" y1="190" x2="448" y2="190" stroke="#a9cbf7" stroke-width="6" />
  <line x1="64" y1="240" x2="448" y2="240" stroke="#a9cbf7" stroke-width="6" />
  <line x1="64" y1="290" x2="448" y2="290" stroke="#a9cbf7" stroke-width="6" />
  <line x1="64" y1="340" x2="448" y2="340" stroke="#a9cbf7" stroke-width="6" />
  <line x1="64" y1="390" x2="448" y2="390" stroke="#a9cbf7" stroke-width="6" />

  <!-- Red vertical margin line -->
  <line x1="140" y1="64" x2="140" y2="448" stroke="#ff9e9e" stroke-width="8" />

  <!-- Hand-drawn style spiral rings on the top edge -->
  <rect x="96" y="32" width="24" height="64" rx="12" fill="#8d6e63" stroke="#2b2e2d" stroke-width="8" />
  <rect x="176" y="32" width="24" height="64" rx="12" fill="#8d6e63" stroke="#2b2e2d" stroke-width="8" />
  <rect x="256" y="32" width="24" height="64" rx="12" fill="#8d6e63" stroke="#2b2e2d" stroke-width="8" />
  <rect x="336" y="32" width="24" height="64" rx="12" fill="#8d6e63" stroke="#2b2e2d" stroke-width="8" />
  <rect x="392" y="32" width="24" height="64" rx="12" fill="#8d6e63" stroke="#2b2e2d" stroke-width="8" />

  <!-- A cute pencil drawing a path -->
  <path d="M 160 300 C 200 240, 260 360, 320 280" fill="none" stroke="#2b2e2d" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />
  
  <g transform="translate(320, 280) rotate(-45)">
    <!-- Pencil body -->
    <path d="M -16 -120 L 16 -120 L 16 -40 L 0 0 L -16 -40 Z" fill="#fff3a0" stroke="#2b2e2d" stroke-width="10" stroke-linejoin="round" />
    <!-- Pencil tip wood -->
    <path d="M -16 -40 L 16 -40 L 0 0 Z" fill="#e8d8be" stroke="#2b2e2d" stroke-width="10" stroke-linejoin="round" />
    <!-- Pencil lead -->
    <path d="M -8 -20 L 8 -20 L 0 0 Z" fill="#2b2e2d" />
    <!-- Eraser band -->
    <rect x="-16" y="-136" width="32" height="16" fill="#8d6e63" stroke="#2b2e2d" stroke-width="10" stroke-linejoin="round" />
    <!-- Eraser -->
    <rect x="-16" y="-152" width="32" height="16" rx="4" fill="#ff9e9e" stroke="#2b2e2d" stroke-width="10" stroke-linejoin="round" />
  </g>
</svg>
