<VirtualHost *:80>
    ServerName sketchboard.online
    ServerAlias www.sketchboard.online
    DocumentRoot /var/www/sketchboard

    <Directory /var/www/sketchboard>
        AllowOverride All
        Require all granted
        Options FollowSymLinks
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/sketchboard-error.log
    CustomLog ${APACHE_LOG_DIR}/sketchboard-access.log combined
</VirtualHost>
